<style type="text/css">
html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: transparent !important;
    }
    body::before, body::after { display: none !important; }

    body {
      display: grid;
      place-items: center;
      font-family: 'Sora', sans-serif;
    }

    #scene {
      width: 736px;
      height: 736px;
      perspective: 900px;
    }

    svg {
      width: 736px;
      height: 736px;
      overflow: visible;
      transform-style: preserve-3d;
    }

    .layer {
      transform-box: fill-box;
      transform-origin: 50% 50%;
    }

    .text-title {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -1px;
      fill: #272727;
    }

    .text-year {
      font-size: 18px;
      font-weight: 400;
      fill: #9a9a9c;
    }
</style>

