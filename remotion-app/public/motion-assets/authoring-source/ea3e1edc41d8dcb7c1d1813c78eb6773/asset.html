<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Headline Glass Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: transparent !important;
    }
    body::before, body::after { display: none !important; }

    body {
      display: grid;
      place-items: center;
      font-family: 'Sora', sans-serif;
    }

    #scene {
      width: 564px;
      height: 705px;
      perspective: 900px;
    }

    svg {
      width: 564px;
      height: 705px;
      overflow: visible;
      transform-style: preserve-3d;
    }

    .text-primary {
      font-size: 44px;
      font-weight: 600;
      fill: #eef2ff;
      letter-spacing: -0.8px;
    }

    .text-secondary {
      font-size: 44px;
      font-weight: 400;
      fill: #e5ebff;
      letter-spacing: -0.8px;
    }

    .text-secondary-italic {
      font-size: 44px;
      font-weight: 400;
      font-style: italic;
      fill: #dce5ff;
      letter-spacing: -0.8px;
    }

    .text-tertiary {
      font-size: 14px;
      font-weight: 500;
      fill: #c7d2ff;
    }
  </style>
</head>
<body>
  <div id="scene">
    <svg
      id="asset"
      viewBox="0 0 564 705"
      width="564"
      height="705"
      xmlns="http://www.w3.org/2000/svg"
      data-asset-name="ea3e1edc41d8dcb7c1d1813c78eb6773"
      data-asset-type="headline-card"
      data-image-slots="0"
      data-text-slots="4"
      data-asset-version="1"
    >
      <title>Headline Glass Card</title>
      <desc>Blue headline with glass chart card.</desc>
      <metadata id="asset_metadata">
        {
          "name": "ea3e1edc41d8dcb7c1d1813c78eb6773",
          "assetId": "ea3e1edc41d8dcb7c1d1813c78eb6773",
          "filename": "ea3e1edc41d8dcb7c1d1813c78eb6773.html",
          "displayName": "Headline Glass Card",
          "type": "headline-card",
          "description": "Blue headline with glass chart and body text.",
          "macro": "headline glass card",
          "keywords": [
            "headline",
            "blue",
            "glassmorphism",
            "chart",
            "card"
          ],
          "imageSlots": 0,
          "imageSlotNames": [],
          "imageSlotRoles": [],
          "textSlots": 4,
          "textSlotNames": [
            "text_primary_1",
            "text_secondary_1",
            "text_secondary_2",
            "text_tertiary_1"
          ],
          "textSlotRoles": [
            "primary",
            "secondary",
            "secondary",
            "tertiary"
          ],
          "textArtifacts": [
            {
              "id": "text_primary_1",
              "role": "primary",
              "category": "core",
              "slot": "1",
              "text": "Headline",
              "charCount": 8
            },
            {
              "id": "text_secondary_1",
              "role": "secondary",
              "category": "descriptor",
              "slot": "1",
              "text": "Goes",
              "charCount": 4
            },
            {
              "id": "text_secondary_2",
              "role": "secondary",
              "category": "descriptor",
              "slot": "2",
              "text": "Here",
              "charCount": 4
            },
            {
              "id": "text_tertiary_1",
              "role": "tertiary",
              "category": "descriptor",
              "slot": "1",
              "text": "maybe put a little bit of body text here.",
              "charCount": 41
            }
          ],
          "textArtifactCount": 4,
          "textArtifactCounts": {
            "core": 1,
            "descriptor": 3,
            "stray": 0
          },
          "format": "svg+gsap",
          "version": "1.0.0"
        }
      </metadata>
      <defs>
        <radialGradient id="bgFade" cx="45%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#2b58c7" stop-opacity="0.9" />
          <stop offset="55%" stop-color="#0d1e4a" stop-opacity="0.75" />
          <stop offset="100%" stop-color="#0d1e4a" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="fadeMaskGradient" cx="50%" cy="45%" r="70%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
          <stop offset="70%" stop-color="#ffffff" stop-opacity="0.7" />
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
        </radialGradient>
        <linearGradient id="cardFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#2a4f9e" stop-opacity="0.45" />
          <stop offset="100%" stop-color="#162e6b" stop-opacity="0.65" />
        </linearGradient>
        <linearGradient id="cardStroke" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#c6d7ff" stop-opacity="0.55" />
          <stop offset="100%" stop-color="#8ba7ff" stop-opacity="0.25" />
        </linearGradient>
        <radialGradient id="cardSheen" cx="35%" cy="20%" r="70%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18" />
          <stop offset="70%" stop-color="#ffffff" stop-opacity="0" />
        </radialGradient>
        <linearGradient id="chartLine" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#9bb4ff" />
          <stop offset="100%" stop-color="#dbe6ff" />
        </linearGradient>
        <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
          <stop offset="70%" stop-color="#9bb4ff" stop-opacity="0.2" />
          <stop offset="100%" stop-color="#9bb4ff" stop-opacity="0" />
        </radialGradient>
        <pattern id="dotPattern" width="14" height="14" patternUnits="userSpaceOnUse">
          <circle cx="2" cy="2" r="1.2" fill="#8ba7ff" opacity="0.35" />
        </pattern>
        <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="180%">
          <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.4" />
        </filter>
        <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="1" stdDeviation="0" flood-color="#ffffff" flood-opacity="0.15" />
          <feDropShadow dx="0" dy="2" stdDeviation="10" flood-color="#000000" flood-opacity="0.2" />
        </filter>
        <mask id="fadeMask">
          <rect x="0" y="0" width="564" height="705" fill="url(#fadeMaskGradient)" />
        </mask>
        <clipPath id="clip-card">
          <rect x="100" y="290" width="364" height="300" rx="28" />
        </clipPath>
        <clipPath id="clip-text">
          <rect id="textClipRect" x="60" y="80" width="444" height="360" />
        </clipPath>
      </defs>

      <g id="background_fade" mask="url(#fadeMask)">
        <rect x="0" y="0" width="564" height="705" fill="url(#bgFade)" />
      </g>

      <g id="text_group" clip-path="url(#clip-text)" filter="url(#textShadow)">
        <text id="text_primary_1" data-text-slot="1" data-text-role="primary" class="text-primary" x="68" y="140">Headline</text>
        <text id="text_secondary_1" data-text-slot="1" data-text-role="secondary" class="text-secondary" x="68" y="195">Goes</text>
        <text id="text_secondary_2" data-text-slot="2" data-text-role="secondary" class="text-secondary-italic" x="210" y="195">Here</text>
        <text id="text_tertiary_1" data-text-slot="1" data-text-role="tertiary" class="text-tertiary" x="282" y="360" text-anchor="middle">maybe put a little bit of body text here.</text>
      </g>

      <g id="card_group" filter="url(#cardShadow)">
        <rect x="100" y="290" width="364" height="300" rx="28" fill="url(#cardFill)" />
        <rect x="100" y="290" width="364" height="300" rx="28" fill="url(#cardSheen)" />
        <rect x="100" y="290" width="364" height="300" rx="28" fill="none" stroke="url(#cardStroke)" stroke-width="1.5" />
      </g>

      <g id="card_detail" clip-path="url(#clip-card)">
        <path d="M140 520 C180 480 210 560 260 520 C290 500 300 450 330 470 C360 490 380 460 420 420" fill="none" stroke="url(#chartLine)" stroke-width="2" />
        <rect x="140" y="420" width="300" height="120" fill="url(#dotPattern)" opacity="0.45" />
        <g transform="translate(310 470)">
          <circle r="22" fill="url(#dotGlow)" />
          <circle r="6" fill="#ffffff" />
        </g>
      </g>
    </svg>
  </div>

  <script src="/motion-assets/vendor/gsap.min.js"></script>
  <script>
    const svg = document.getElementById('asset');
    const backgroundFade = document.getElementById('background_fade');
    const textGroup = document.getElementById('text_group');
    const textClipRect = document.getElementById('textClipRect');
    const cardGroup = document.getElementById('card_group');
    const cardDetail = document.getElementById('card_detail');

    const primaryText = document.getElementById('text_primary_1');
    const secondaryText = document.getElementById('text_secondary_1');

    const CHAR_ROLES = new Set(['primary', 'secondary', 'tertiary']);
    const SVG_NS = 'http://www.w3.org/2000/svg';
    let primaryChars = [];
    let secondaryChars = [];
    let tertiaryChars = [];
    let allChars = [];

    let idleTweens = [];
    let mainTl = null;

    function splitTextToChars(textEl) {
      const role = textEl.getAttribute('data-text-role');
      if (!CHAR_ROLES.has(role)) return null;
      if (!textEl.id) textEl.id = `text_${Math.random().toString(36).slice(2, 8)}`;
      const id = textEl.id;
      const parent = textEl.parentNode;
      const existing = parent.querySelector(`[data-char-group-for="${id}"]`);
      if (existing) existing.remove();

      const group = document.createElementNS(SVG_NS, 'g');
      group.setAttribute('data-char-group-for', id);
      group.setAttribute('data-text-role', role);
      const slot = textEl.getAttribute('data-text-slot');
      if (slot) group.setAttribute('data-text-slot', slot);

      textEl.setAttribute('opacity', '0');
      textEl.style.pointerEvents = 'none';

      const charCount = textEl.getNumberOfChars();
      const textValue = textEl.textContent || '';
      const attrs = ['class', 'fill', 'font-family', 'font-size', 'font-weight', 'text-anchor'];
      for (let i = 0; i < charCount; i += 1) {
        const ch = textValue.charAt(i);
        const pos = textEl.getStartPositionOfChar(i);
        const charEl = document.createElementNS(SVG_NS, 'text');
        charEl.textContent = ch;
        charEl.setAttribute('x', pos.x);
        charEl.setAttribute('y', pos.y);
        attrs.forEach((attr) => {
          const val = textEl.getAttribute(attr);
          if (val) charEl.setAttribute(attr, val);
        });
        charEl.setAttribute('xml:space', 'preserve');
        charEl.setAttribute('data-char', '1');
        charEl.setAttribute('data-text-role', role);
        if (slot) charEl.setAttribute('data-text-slot', slot);
        group.appendChild(charEl);
      }
      parent.appendChild(group);
      return group;
    }

    function rebuildCharGroups() {
      const textNodes = Array.from(svg.querySelectorAll('text[data-text-role]'))
        .filter((node) => CHAR_ROLES.has(node.getAttribute('data-text-role')));
      textNodes.forEach(splitTextToChars);
      primaryChars = Array.from(svg.querySelectorAll('[data-char="1"][data-text-role="primary"]'));
      secondaryChars = Array.from(svg.querySelectorAll('[data-char="1"][data-text-role="secondary"]'));
      tertiaryChars = Array.from(svg.querySelectorAll('[data-char="1"][data-text-role="tertiary"]'));
      allChars = primaryChars.concat(secondaryChars, tertiaryChars);
    }

    function animateCharsInTimeline(tl, atTime) {
      if (primaryChars.length) {
        tl.to(primaryChars, {
          opacity: 1,
          y: 0,
          filter: 'blur(0px)',
          duration: 0.9,
          ease: 'power3.out',
          stagger: { each: 0.018, from: 'center' }
        }, atTime);
      }
      if (secondaryChars.length) {
        tl.to(secondaryChars, {
          opacity: 1,
          y: 0,
          filter: 'blur(0px)',
          duration: 0.85,
          ease: 'power3.out',
          stagger: { each: 0.012, from: 'start' }
        }, atTime + 0.03);
      }
      if (tertiaryChars.length) {
        tl.to(tertiaryChars, {
          opacity: 1,
          y: 0,
          filter: 'blur(0px)',
          duration: 0.8,
          ease: 'power3.out',
          stagger: { each: 0.012, from: 'start' }
        }, atTime + 0.05);
      }
    }

    function animateCharsInNow() {
      if (primaryChars.length) {
        gsap.to(primaryChars, {
          opacity: 1,
          y: 0,
          filter: 'blur(0px)',
          duration: 0.9,
          ease: 'power3.out',
          stagger: { each: 0.018, from: 'center' }
        });
      }
      if (secondaryChars.length) {
        gsap.to(secondaryChars, {
          opacity: 1,
          y: 0,
          filter: 'blur(0px)',
          duration: 0.85,
          ease: 'power3.out',
          stagger: { each: 0.012, from: 'start' }
        });
      }
      if (tertiaryChars.length) {
        gsap.to(tertiaryChars, {
          opacity: 1,
          y: 0,
          filter: 'blur(0px)',
          duration: 0.8,
          ease: 'power3.out',
          stagger: { each: 0.012, from: 'start' }
        });
      }
    }

    function setInitial() {
      rebuildCharGroups();
      gsap.set([backgroundFade, cardGroup, cardDetail], {
        y: 110,
        opacity: 0,
        scale: 0.88,
        filter: 'blur(16px)',
        rotationX: 12,
        transformPerspective: 800,
        transformOrigin: '50% 50%'
      });
      gsap.set(textClipRect, {
        attr: { y: 460 }
      });
      gsap.set(allChars, { opacity: 0, y: 12, filter: 'blur(12px)' });
    }

    function runScene() {
      idleTweens.forEach((t) => t.kill());
      idleTweens = [];
      if (mainTl) mainTl.kill();
      gsap.killTweensOf([backgroundFade, cardGroup, cardDetail, textClipRect, ...allChars]);

      setInitial();

      mainTl = gsap.timeline();
      mainTl
        .to([backgroundFade, cardGroup, cardDetail], {
          y: 0,
          opacity: 1,
          scale: 1,
          filter: 'blur(0px)',
          rotationX: 0,
          duration: 1.15,
          ease: 'expo.out'
        }, 0)
        .to(textClipRect, {
          attr: { y: 80 },
          duration: 0.9,
          ease: 'expo.out'
        }, 0.75)
        .add(() => {
          idleTweens.push(
            gsap.to([cardGroup, cardDetail], {
              y: -8,
              duration: 3.8,
              ease: 'sine.inOut',
              yoyo: true,
              repeat: -1
            })
          );
        }, 1.45);

      animateCharsInTimeline(mainTl, 0.75);
    }

    function updateAsset(newPrimary, newSecondary) {
      const tl = gsap.timeline();
      tl.to(allChars, {
        opacity: 0,
        y: 10,
        filter: 'blur(4px)',
        duration: 0.28,
        ease: 'power2.in',
        stagger: 0.006
      })
        .call(() => {
          if (typeof newPrimary === 'string') primaryText.textContent = newPrimary;
          if (typeof newSecondary === 'string') secondaryText.textContent = newSecondary;
          rebuildCharGroups();
          gsap.set(allChars, { opacity: 0, y: 12, filter: 'blur(12px)' });
        })
        .call(() => {
          animateCharsInNow();
        });
    }

    window.runScene = runScene;
    window.updateAsset = updateAsset;

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(runScene);
    } else {
      runScene();
    }
  </script>
</body>
</html>
