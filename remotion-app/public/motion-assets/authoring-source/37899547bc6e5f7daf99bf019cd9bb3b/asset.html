<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TCU Myth vs Fact Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: transparent !important;
    }
    body::before, body::after { display: none !important; }

    body {
      display: grid;
      place-items: center;
      font-family: 'Sora', sans-serif;
    }

    #scene {
      width: 564px;
      height: 564px;
      perspective: 900px;
    }

    svg {
      width: 564px;
      height: 564px;
      overflow: visible;
      transform-style: preserve-3d;
    }

    .text-primary {
      font-size: 20px;
      font-weight: 600;
      fill: #f4f4f4;
      letter-spacing: -0.3px;
    }

    .text-secondary {
      font-size: 20px;
      font-weight: 600;
      fill: #f4f4f4;
      letter-spacing: -0.3px;
    }

    .text-tertiary {
      font-size: 16px;
      font-weight: 600;
      fill: #ffffff;
      letter-spacing: -0.2px;
    }

    .text-stray {
      font-size: 34px;
      font-weight: 700;
      fill: #f6f6f6;
      letter-spacing: -0.5px;
    }
  </style>
</head>
<body>
  <div id="scene">
    <svg
      id="asset"
      viewBox="0 0 564 564"
      width="564"
      height="564"
      xmlns="http://www.w3.org/2000/svg"
      data-asset-name="37899547bc6e5f7daf99bf019cd9bb3b"
      data-asset-type="infographic-card"
      data-image-slots="0"
      data-text-slots="5"
      data-asset-version="1"
    >
      <title>TCU Myth vs Fact Card</title>
      <desc>Glassmorphism myth vs fact card with two stacked pills, tags, and red ring.</desc>
      <metadata id="asset_metadata">
        {
          "name": "37899547bc6e5f7daf99bf019cd9bb3b",
          "assetId": "37899547bc6e5f7daf99bf019cd9bb3b",
          "filename": "37899547bc6e5f7daf99bf019cd9bb3b.html",
          "displayName": "TCU Myth vs Fact Card",
          "type": "infographic-card",
          "description": "Glassmorphism myth vs fact card with stacked pills and ring.",
          "macro": "myth vs fact glassmorphism card",
          "keywords": [
            "tcu",
            "myth",
            "fact",
            "followers",
            "sales",
            "glassmorphism",
            "infographic",
            "card",
            "red",
            "dark"
          ],
          "imageSlots": 0,
          "imageSlotNames": [],
          "imageSlotRoles": [],
          "textSlots": 5,
          "textSlotNames": [
            "text_primary_1",
            "text_secondary_1",
            "text_tertiary_1",
            "text_tertiary_2",
            "text_stray_1"
          ],
          "textSlotRoles": [
            "primary",
            "secondary",
            "tertiary",
            "tertiary",
            "stray"
          ],
          "textArtifacts": [
            {
              "id": "text_primary_1",
              "role": "primary",
              "category": "core",
              "slot": "1",
              "text": "More Followers = More Sales",
              "charCount": 27
            },
            {
              "id": "text_secondary_1",
              "role": "secondary",
              "category": "descriptor",
              "slot": "1",
              "text": "Strategy drives sales, not vanity metrics.",
              "charCount": 42
            },
            {
              "id": "text_tertiary_1",
              "role": "tertiary",
              "category": "descriptor",
              "slot": "1",
              "text": "Myth",
              "charCount": 4
            },
            {
              "id": "text_tertiary_2",
              "role": "tertiary",
              "category": "descriptor",
              "slot": "2",
              "text": "Fact",
              "charCount": 4
            },
            {
              "id": "text_stray_1",
              "role": "stray",
              "category": "stray",
              "slot": "1",
              "text": "tcu.",
              "charCount": 4
            }
          ],
          "textArtifactCount": 5,
          "textArtifactCounts": {
            "core": 1,
            "descriptor": 3,
            "stray": 1
          },
          "format": "svg+gsap",
          "version": "1.0.0"
        }
      </metadata>
      <defs>
        <radialGradient id="bgGradient" cx="65%" cy="60%" r="70%">
          <stop offset="0%" stop-color="#6b0c0d" />
          <stop offset="45%" stop-color="#280304" />
          <stop offset="100%" stop-color="#000000" />
        </radialGradient>
        <radialGradient id="bgGlow" cx="20%" cy="80%" r="50%">
          <stop offset="0%" stop-color="#8f0f12" stop-opacity="0.7" />
          <stop offset="70%" stop-color="#000000" stop-opacity="0" />
        </radialGradient>

        <linearGradient id="pillTopGradient" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#2a0a0a" />
          <stop offset="60%" stop-color="#3a1414" />
          <stop offset="100%" stop-color="#2d0b0b" />
        </linearGradient>
        <linearGradient id="pillBottomGradient" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#520708" />
          <stop offset="60%" stop-color="#8b1115" />
          <stop offset="100%" stop-color="#5a0a0c" />
        </linearGradient>
        <radialGradient id="pillSheen" cx="30%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22" />
          <stop offset="70%" stop-color="#ffffff" stop-opacity="0" />
        </radialGradient>

        <linearGradient id="ringGradient" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#b3161c" />
          <stop offset="60%" stop-color="#5a0a0c" />
          <stop offset="100%" stop-color="#1a0203" />
        </linearGradient>

        <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
          <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.35" />
        </filter>
        <filter id="frostBlur" x="-20%" y="-20%" width="140%" height="160%">
          <feGaussianBlur stdDeviation="16" />
        </filter>
        <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="1" stdDeviation="0" flood-color="#ffffff" flood-opacity="0.15" />
          <feDropShadow dx="0" dy="2" stdDeviation="10" flood-color="#000000" flood-opacity="0.12" />
        </filter>

        <clipPath id="clip-text">
          <rect id="textClipRect" x="80" y="40" width="420" height="320" rx="0" />
        </clipPath>
      </defs>

      <g id="primary_object">
        <g id="inner_ring" opacity="0.55">
          <circle cx="300" cy="420" r="190" fill="none" stroke="url(#ringGradient)" stroke-width="70" />
        </g>
      </g>

      <g id="floating_elements">
        <g id="pill_top" filter="url(#softShadow)">
          <rect x="70" y="170" width="420" height="90" rx="45" fill="url(#pillTopGradient)" />
          <rect x="70" y="170" width="420" height="90" rx="45" fill="url(#pillSheen)" />
          <rect x="70" y="170" width="420" height="90" rx="45" fill="#ffffff" fill-opacity="0.08" filter="url(#frostBlur)" />
        </g>

        <g id="pill_bottom" filter="url(#softShadow)">
          <rect x="80" y="280" width="420" height="110" rx="55" fill="url(#pillBottomGradient)" />
          <rect x="80" y="280" width="420" height="110" rx="55" fill="url(#pillSheen)" />
          <rect x="80" y="280" width="420" height="110" rx="55" fill="#ffffff" fill-opacity="0.08" filter="url(#frostBlur)" />
        </g>

        <g id="tag_myth" transform="translate(370 150) rotate(-10)" filter="url(#softShadow)">
          <rect x="0" y="0" width="86" height="32" rx="6" fill="#d7d3d2" />
          <rect x="0" y="0" width="86" height="32" rx="6" fill="#ffffff" fill-opacity="0.2" />
        </g>

        <g id="tag_fact" transform="translate(90 286) rotate(-12)" filter="url(#softShadow)">
          <rect x="0" y="0" width="74" height="30" rx="6" fill="#d1191f" />
          <rect x="0" y="0" width="74" height="30" rx="6" fill="#ffffff" fill-opacity="0.15" />
        </g>
      </g>

      <g id="text_group" clip-path="url(#clip-text)" filter="url(#textShadow)">
        <text id="text_stray_1" data-text-slot="1" data-text-role="stray" class="text-stray" x="282" y="60" text-anchor="middle">tcu.</text>

        <text id="text_primary_1" data-text-slot="1" data-text-role="primary" class="text-primary" x="270" y="215" text-anchor="middle">More Followers = More Sales</text>

        <text id="text_secondary_1" data-text-slot="1" data-text-role="secondary" class="text-secondary" x="270" y="328" text-anchor="middle" xml:space="preserve">Strategy drives sales, not vanity<tspan x="270" dy="24"> metrics.</tspan></text>

        <text id="text_tertiary_1" data-text-slot="1" data-text-role="tertiary" class="text-tertiary" x="413" y="173" text-anchor="middle" fill="#3a3232">Myth</text>
        <text id="text_tertiary_2" data-text-slot="2" data-text-role="tertiary" class="text-tertiary" x="127" y="307" text-anchor="middle">Fact</text>
      </g>
    </svg>
  </div>

  <script src="/motion-assets/vendor/gsap.min.js"></script>
  <script>
    const svg = document.getElementById('asset');
    const primaryObject = document.getElementById('primary_object');
    const floatingElements = document.getElementById('floating_elements');
    const textGroup = document.getElementById('text_group');
    const textClipRect = document.getElementById('textClipRect');

    const titleText = document.getElementById('text_primary_1');
    const subtitleText = document.getElementById('text_secondary_1');

    const CHAR_ROLES = new Set(['primary', 'secondary', 'tertiary']);
    const SVG_NS = 'http://www.w3.org/2000/svg';
    let primaryChars = [];
    let secondaryChars = [];
    let tertiaryChars = [];
    let allChars = [];

    let idleTweens = [];
    let mainTl = null;

    function splitTextToChars(textEl) {
      const role = textEl.getAttribute('data-text-role');
      if (!CHAR_ROLES.has(role)) return null;
      if (!textEl.id) textEl.id = `text_${Math.random().toString(36).slice(2, 8)}`;
      const id = textEl.id;
      const parent = textEl.parentNode;
      const existing = parent.querySelector(`[data-char-group-for="${id}"]`);
      if (existing) existing.remove();

      const group = document.createElementNS(SVG_NS, 'g');
      group.setAttribute('data-char-group-for', id);
      group.setAttribute('data-text-role', role);
      const slot = textEl.getAttribute('data-text-slot');
      if (slot) group.setAttribute('data-text-slot', slot);

      textEl.setAttribute('opacity', '0');
      textEl.style.pointerEvents = 'none';

      const charCount = textEl.getNumberOfChars();
      const textValue = textEl.textContent || '';
      const attrs = ['class', 'fill', 'font-family', 'font-size', 'font-weight', 'text-anchor'];
      for (let i = 0; i < charCount; i += 1) {
        const ch = textValue.charAt(i);
        const pos = textEl.getStartPositionOfChar(i);
        const charEl = document.createElementNS(SVG_NS, 'text');
        charEl.textContent = ch;
        charEl.setAttribute('x', pos.x);
        charEl.setAttribute('y', pos.y);
        attrs.forEach((attr) => {
          const val = textEl.getAttribute(attr);
          if (val) charEl.setAttribute(attr, val);
        });
        charEl.setAttribute('xml:space', 'preserve');
        charEl.setAttribute('data-char', '1');
        charEl.setAttribute('data-text-role', role);
        if (slot) charEl.setAttribute('data-text-slot', slot);
        group.appendChild(charEl);
      }
      parent.appendChild(group);
      return group;
    }

    function rebuildCharGroups() {
      const textNodes = Array.from(svg.querySelectorAll('text[data-text-role]'))
        .filter((node) => CHAR_ROLES.has(node.getAttribute('data-text-role')));
      textNodes.forEach(splitTextToChars);
      primaryChars = Array.from(svg.querySelectorAll('[data-char="1"][data-text-role="primary"]'));
      secondaryChars = Array.from(svg.querySelectorAll('[data-char="1"][data-text-role="secondary"]'));
      tertiaryChars = Array.from(svg.querySelectorAll('[data-char="1"][data-text-role="tertiary"]'));
      allChars = primaryChars.concat(secondaryChars, tertiaryChars);
    }

    function animateCharsInTimeline(tl, atTime) {
      if (primaryChars.length) {
        tl.to(primaryChars, {
          opacity: 1,
          y: 0,
          filter: 'blur(0px)',
          duration: 0.9,
          ease: 'power3.out',
          stagger: { each: 0.018, from: 'center' }
        }, atTime);
      }
      if (secondaryChars.length) {
        tl.to(secondaryChars, {
          opacity: 1,
          y: 0,
          filter: 'blur(0px)',
          duration: 0.85,
          ease: 'power3.out',
          stagger: { each: 0.012, from: 'start' }
        }, atTime + 0.03);
      }
      if (tertiaryChars.length) {
        tl.to(tertiaryChars, {
          opacity: 1,
          y: 0,
          filter: 'blur(0px)',
          duration: 0.8,
          ease: 'power3.out',
          stagger: { each: 0.012, from: 'start' }
        }, atTime + 0.05);
      }
    }

    function animateCharsInNow() {
      if (primaryChars.length) {
        gsap.to(primaryChars, {
          opacity: 1,
          y: 0,
          filter: 'blur(0px)',
          duration: 0.9,
          ease: 'power3.out',
          stagger: { each: 0.018, from: 'center' }
        });
      }
      if (secondaryChars.length) {
        gsap.to(secondaryChars, {
          opacity: 1,
          y: 0,
          filter: 'blur(0px)',
          duration: 0.85,
          ease: 'power3.out',
          stagger: { each: 0.012, from: 'start' }
        });
      }
      if (tertiaryChars.length) {
        gsap.to(tertiaryChars, {
          opacity: 1,
          y: 0,
          filter: 'blur(0px)',
          duration: 0.8,
          ease: 'power3.out',
          stagger: { each: 0.012, from: 'start' }
        });
      }
    }

    function setInitial() {
      rebuildCharGroups();
      gsap.set(primaryObject, {
        y: 110,
        opacity: 0,
        scale: 0.88,
        filter: 'blur(16px)',
        rotationX: 12,
        transformPerspective: 800,
        transformOrigin: '50% 50%'
      });
      gsap.set(floatingElements, {
        y: 140,
        opacity: 0,
        filter: 'blur(12px)'
      });
      gsap.set(textClipRect, {
        attr: { y: 380 }
      });
      gsap.set(allChars, { opacity: 0, y: 12, filter: 'blur(12px)' });
    }

    function runScene() {
      idleTweens.forEach((t) => t.kill());
      idleTweens = [];
      if (mainTl) mainTl.kill();
      gsap.killTweensOf([primaryObject, floatingElements, textClipRect, ...allChars]);

      setInitial();

      mainTl = gsap.timeline();
      mainTl
        .to(primaryObject, {
          y: 0,
          opacity: 1,
          scale: 1,
          filter: 'blur(0px)',
          rotationX: 0,
          duration: 1.15,
          ease: 'expo.out'
        }, 0)
        .to(floatingElements, {
          y: 0,
          opacity: 1,
          filter: 'blur(0px)',
          duration: 0.92,
          ease: 'expo.out'
        }, 0.38)
        .to(textClipRect, {
          attr: { y: 40 },
          duration: 0.9,
          ease: 'expo.out'
        }, 0.75)
        .add(() => {
          idleTweens.push(
            gsap.to(primaryObject, {
              y: -8,
              duration: 3.8,
              ease: 'sine.inOut',
              yoyo: true,
              repeat: -1
            })
          );
          idleTweens.push(
            gsap.to(floatingElements, {
              y: -5,
              duration: 3.2,
              ease: 'sine.inOut',
              yoyo: true,
              repeat: -1,
              delay: 0.35
            })
          );
        }, 1.45);

      animateCharsInTimeline(mainTl, 0.75);
    }

    function updateAsset(newPrimary, newSecondary) {
      const tl = gsap.timeline();
      tl.to(allChars, {
        opacity: 0,
        y: 10,
        filter: 'blur(4px)',
        duration: 0.28,
        ease: 'power2.in',
        stagger: 0.006
      })
        .call(() => {
          if (typeof newPrimary === 'string') titleText.textContent = newPrimary;
          if (typeof newSecondary === 'string') subtitleText.textContent = newSecondary;
          rebuildCharGroups();
          gsap.set(allChars, { opacity: 0, y: 12, filter: 'blur(12px)' });
        })
        .call(() => {
          animateCharsInNow();
        });
    }

    window.runScene = runScene;
    window.updateAsset = updateAsset;

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(runScene);
    } else {
      runScene();
    }
  </script>
</body>
</html>
