<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Brand Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: transparent !important;
    }
    body::before, body::after { display: none !important; }

    body {
      display: grid;
      place-items: center;
      font-family: 'Sora', sans-serif;
    }

    #scene {
      width: 564px;
      height: 705px;
      perspective: 900px;
    }

    svg {
      width: 564px;
      height: 705px;
      overflow: visible;
      transform-style: preserve-3d;
    }

    .text-primary {
      font-size: 18px;
      font-weight: 600;
      fill: #f4f4f4;
    }

    .text-secondary {
      font-size: 18px;
      font-weight: 400;
      fill: #b4b4b4;
    }

    .text-tertiary {
      font-size: 12px;
      font-weight: 500;
      fill: #9b9b9b;
    }
  </style>
</head>
<body>
  <div id="scene">
    <svg
      id="asset"
      viewBox="0 0 564 705"
      width="564"
      height="705"
      xmlns="http://www.w3.org/2000/svg"
      data-asset-name="f27962c3497c2f66fb3cb82a89483ae4"
      data-asset-type="command-bar"
      data-image-slots="0"
      data-text-slots="3"
      data-asset-version="1"
    >
      <title>Create Brand Intelligence</title>
      <desc>Dark command bar with grid background and orange glow.</desc>
      <metadata id="asset_metadata">
        {
          "name": "f27962c3497c2f66fb3cb82a89483ae4",
          "assetId": "f27962c3497c2f66fb3cb82a89483ae4",
          "filename": "f27962c3497c2f66fb3cb82a89483ae4.html",
          "displayName": "Create Brand Intelligence",
          "type": "command-bar",
          "description": "Dark command bar with glow and background grid.",
          "macro": "create brand intelligence bar",
          "keywords": [
            "command",
            "bar",
            "dark",
            "grid",
            "orange",
            "glow"
          ],
          "imageSlots": 0,
          "imageSlotNames": [],
          "imageSlotRoles": [],
          "textSlots": 3,
          "textSlotNames": [
            "text_primary_1",
            "text_secondary_1",
            "text_tertiary_1"
          ],
          "textSlotRoles": [
            "primary",
            "secondary",
            "tertiary"
          ],
          "textArtifacts": [
            {
              "id": "text_primary_1",
              "role": "primary",
              "category": "core",
              "slot": "1",
              "text": "Create",
              "charCount": 6
            },
            {
              "id": "text_secondary_1",
              "role": "secondary",
              "category": "descriptor",
              "slot": "1",
              "text": "Brand Intelligence",
              "charCount": 18
            },
            {
              "id": "text_tertiary_1",
              "role": "tertiary",
              "category": "descriptor",
              "slot": "1",
              "text": "Free Vector Assets",
              "charCount": 18
            }
          ],
          "textArtifactCount": 3,
          "textArtifactCounts": {
            "core": 1,
            "descriptor": 2,
            "stray": 0
          },
          "format": "svg+gsap",
          "version": "1.0.0"
        }
      </metadata>
      <defs>
        <radialGradient id="bgFade" cx="50%" cy="45%" r="70%">
          <stop offset="0%" stop-color="#1a1a1a" stop-opacity="0.85" />
          <stop offset="55%" stop-color="#0a0a0a" stop-opacity="0.7" />
          <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="fadeMaskGradient" cx="50%" cy="50%" r="70%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
          <stop offset="70%" stop-color="#ffffff" stop-opacity="0.7" />
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
        </radialGradient>
        <linearGradient id="barGradient" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#1b1b1b" />
          <stop offset="100%" stop-color="#0f0f0f" />
        </linearGradient>
        <linearGradient id="barStroke" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03" />
        </linearGradient>
        <linearGradient id="orangeGlow" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#ffb868" stop-opacity="0.8" />
          <stop offset="100%" stop-color="#ff7a1a" stop-opacity="0" />
        </linearGradient>
        <pattern id="gridPattern" width="70" height="70" patternUnits="userSpaceOnUse">
          <rect width="70" height="70" fill="none" stroke="#1c1c1c" stroke-width="1" />
        </pattern>
        <filter id="barShadow" x="-30%" y="-30%" width="160%" height="180%">
          <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.5" />
        </filter>
        <filter id="glowBlur" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="16" />
        </filter>
        <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="1" stdDeviation="0" flood-color="#ffffff" flood-opacity="0.15" />
          <feDropShadow dx="0" dy="2" stdDeviation="10" flood-color="#000000" flood-opacity="0.2" />
        </filter>
        <mask id="fadeMask">
          <rect x="0" y="0" width="564" height="705" fill="url(#fadeMaskGradient)" />
        </mask>
        <clipPath id="clip-text">
          <rect id="textClipRect" x="80" y="285" width="404" height="400" />
        </clipPath>
      </defs>

      <g id="background_fade" mask="url(#fadeMask)">
        <rect x="0" y="0" width="564" height="705" fill="url(#bgFade)" />
        <rect x="42" y="140" width="480" height="420" fill="url(#gridPattern)" opacity="0.4" />
      </g>

      <g id="bar_group" filter="url(#barShadow)">
        <rect x="80" y="300" width="404" height="70" rx="35" fill="url(#barGradient)" />
        <rect x="80" y="300" width="404" height="70" rx="35" fill="none" stroke="url(#barStroke)" stroke-width="1.5" />
        <rect x="260" y="310" width="150" height="50" fill="url(#orangeGlow)" filter="url(#glowBlur)" opacity="0.8" />
        <rect x="250" y="318" width="4" height="34" fill="#ff9a3c" />
        <circle cx="120" cy="335" r="14" fill="#1a1a1a" stroke="#ff9a3c" stroke-width="2" />
        <path d="M114 335 H126 M120 329 V341" stroke="#ff9a3c" stroke-width="2" stroke-linecap="round" />
      </g>

      <g id="text_group" clip-path="url(#clip-text)" filter="url(#textShadow)">
        <text id="text_primary_1" data-text-slot="1" data-text-role="primary" class="text-primary" x="145" y="344">Create</text>
        <text id="text_secondary_1" data-text-slot="1" data-text-role="secondary" class="text-secondary" x="220" y="344">Brand Intelligence</text>
        <text id="text_tertiary_1" data-text-slot="1" data-text-role="tertiary" class="text-tertiary" x="300" y="654">Free Vector Assets</text>
      </g>

      <g id="footer_group">
        <circle cx="282" cy="650" r="10" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1" />
        <path d="M278 648 L282 654 L286 648" fill="none" stroke="#888888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
      </g>
    </svg>
  </div>

  <script src="/motion-assets/vendor/gsap.min.js"></script>
  <script>
    const svg = document.getElementById('asset');
    const backgroundFade = document.getElementById('background_fade');
    const barGroup = document.getElementById('bar_group');
    const textGroup = document.getElementById('text_group');
    const footerGroup = document.getElementById('footer_group');
    const textClipRect = document.getElementById('textClipRect');

    const primaryText = document.getElementById('text_primary_1');
    const secondaryText = document.getElementById('text_secondary_1');

    const CHAR_ROLES = new Set(['primary', 'secondary', 'tertiary']);
    const SVG_NS = 'http://www.w3.org/2000/svg';
    let primaryChars = [];
    let secondaryChars = [];
    let tertiaryChars = [];
    let allChars = [];

    let idleTweens = [];
    let mainTl = null;

    function splitTextToChars(textEl) {
      const role = textEl.getAttribute('data-text-role');
      if (!CHAR_ROLES.has(role)) return null;
      if (!textEl.id) textEl.id = `text_${Math.random().toString(36).slice(2, 8)}`;
      const id = textEl.id;
      const parent = textEl.parentNode;
      const existing = parent.querySelector(`[data-char-group-for="${id}"]`);
      if (existing) existing.remove();

      const group = document.createElementNS(SVG_NS, 'g');
      group.setAttribute('data-char-group-for', id);
      group.setAttribute('data-text-role', role);
      const slot = textEl.getAttribute('data-text-slot');
      if (slot) group.setAttribute('data-text-slot', slot);

      textEl.setAttribute('opacity', '0');
      textEl.style.pointerEvents = 'none';

      const charCount = textEl.getNumberOfChars();
      const textValue = textEl.textContent || '';
      const attrs = ['class', 'fill', 'font-family', 'font-size', 'font-weight', 'text-anchor'];
      for (let i = 0; i < charCount; i += 1) {
        const ch = textValue.charAt(i);
        const pos = textEl.getStartPositionOfChar(i);
        const charEl = document.createElementNS(SVG_NS, 'text');
        charEl.textContent = ch;
        charEl.setAttribute('x', pos.x);
        charEl.setAttribute('y', pos.y);
        attrs.forEach((attr) => {
          const val = textEl.getAttribute(attr);
          if (val) charEl.setAttribute(attr, val);
        });
        charEl.setAttribute('xml:space', 'preserve');
        charEl.setAttribute('data-char', '1');
        charEl.setAttribute('data-text-role', role);
        if (slot) charEl.setAttribute('data-text-slot', slot);
        group.appendChild(charEl);
      }
      parent.appendChild(group);
      return group;
    }

    function rebuildCharGroups() {
      const textNodes = Array.from(svg.querySelectorAll('text[data-text-role]'))
        .filter((node) => CHAR_ROLES.has(node.getAttribute('data-text-role')));
      textNodes.forEach(splitTextToChars);
      primaryChars = Array.from(svg.querySelectorAll('[data-char=\"1\"][data-text-role=\"primary\"]'));
      secondaryChars = Array.from(svg.querySelectorAll('[data-char=\"1\"][data-text-role=\"secondary\"]'));
      tertiaryChars = Array.from(svg.querySelectorAll('[data-char=\"1\"][data-text-role=\"tertiary\"]'));
      allChars = primaryChars.concat(secondaryChars, tertiaryChars);
    }

    function animateCharsInTimeline(tl, atTime) {
      if (primaryChars.length) {
        tl.to(primaryChars, {
          opacity: 1,
          y: 0,
          filter: 'blur(0px)',
          duration: 0.9,
          ease: 'power3.out',
          stagger: { each: 0.018, from: 'center' }
        }, atTime);
      }
      if (secondaryChars.length) {
        tl.to(secondaryChars, {
          opacity: 1,
          y: 0,
          filter: 'blur(0px)',
          duration: 0.85,
          ease: 'power3.out',
          stagger: { each: 0.012, from: 'start' }
        }, atTime + 0.03);
      }
      if (tertiaryChars.length) {
        tl.to(tertiaryChars, {
          opacity: 1,
          y: 0,
          filter: 'blur(0px)',
          duration: 0.8,
          ease: 'power3.out',
          stagger: { each: 0.012, from: 'start' }
        }, atTime + 0.05);
      }
    }

    function animateCharsInNow() {
      if (primaryChars.length) {
        gsap.to(primaryChars, {
          opacity: 1,
          y: 0,
          filter: 'blur(0px)',
          duration: 0.9,
          ease: 'power3.out',
          stagger: { each: 0.018, from: 'center' }
        });
      }
      if (secondaryChars.length) {
        gsap.to(secondaryChars, {
          opacity: 1,
          y: 0,
          filter: 'blur(0px)',
          duration: 0.85,
          ease: 'power3.out',
          stagger: { each: 0.012, from: 'start' }
        });
      }
      if (tertiaryChars.length) {
        gsap.to(tertiaryChars, {
          opacity: 1,
          y: 0,
          filter: 'blur(0px)',
          duration: 0.8,
          ease: 'power3.out',
          stagger: { each: 0.012, from: 'start' }
        });
      }
    }

    function setInitial() {
      rebuildCharGroups();
      gsap.set([backgroundFade, barGroup, footerGroup], {
        y: 110,
        opacity: 0,
        scale: 0.88,
        filter: 'blur(16px)',
        rotationX: 12,
        transformPerspective: 800,
        transformOrigin: '50% 50%'
      });
      gsap.set(textClipRect, {
        attr: { y: 720 }
      });
      gsap.set(allChars, { opacity: 0, y: 12, filter: 'blur(12px)' });
    }

    function runScene() {
      idleTweens.forEach((t) => t.kill());
      idleTweens = [];
      if (mainTl) mainTl.kill();
      gsap.killTweensOf([backgroundFade, barGroup, footerGroup, textClipRect, ...allChars]);

      setInitial();

      mainTl = gsap.timeline();
      mainTl
        .to([backgroundFade, barGroup, footerGroup], {
          y: 0,
          opacity: 1,
          scale: 1,
          filter: 'blur(0px)',
          rotationX: 0,
          duration: 1.15,
          ease: 'expo.out'
        }, 0)
        .to(textClipRect, {
          attr: { y: 285 },
          duration: 0.9,
          ease: 'expo.out'
        }, 0.75)
        .add(() => {
          idleTweens.push(
            gsap.to([barGroup, footerGroup], {
              y: -8,
              duration: 3.8,
              ease: 'sine.inOut',
              yoyo: true,
              repeat: -1
            })
          );
        }, 1.45);

      animateCharsInTimeline(mainTl, 0.75);
    }

    function updateAsset(newPrimary, newSecondary, newTertiary) {
      const tl = gsap.timeline();
      tl.to(allChars, {
        opacity: 0,
        y: 10,
        filter: 'blur(4px)',
        duration: 0.28,
        ease: 'power2.in',
        stagger: 0.006
      })
        .call(() => {
          if (typeof newPrimary === 'string') primaryText.textContent = newPrimary;
          if (typeof newSecondary === 'string') secondaryText.textContent = newSecondary;
          if (typeof newTertiary === 'string') document.getElementById('text_tertiary_1').textContent = newTertiary;
          rebuildCharGroups();
          gsap.set(allChars, { opacity: 0, y: 12, filter: 'blur(12px)' });
        })
        .call(() => {
          animateCharsInNow();
        });
    }

    window.runScene = runScene;
    window.updateAsset = updateAsset;

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(runScene);
    } else {
      runScene();
    }
  </script>
</body>
</html>
